name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Resolve package version
        id: meta
        run: |
          python - <<'PY'
          import ast
          import os
          from pathlib import Path

          module = ast.parse(Path("src/chatqiniu/__init__.py").read_text(encoding="utf-8"))
          for stmt in module.body:
              if not isinstance(stmt, ast.Assign):
                  continue
              if any(isinstance(target, ast.Name) and target.id == "__version__" for target in stmt.targets):
                  version = ast.literal_eval(stmt.value)
                  break
          else:
              raise SystemExit("__version__ not found in src/chatqiniu/__init__.py")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={version}", file=output)
              print(f"tag=v{version}", file=output)
          PY
      - name: Check tag matches package version
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "${RELEASE_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${RELEASE_TAG}."
            exit 1
          fi
      - name: Check PyPI version
        id: pypi
        env:
          PACKAGE_NAME: "Chatqiniu"
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          package = os.environ["PACKAGE_NAME"]
          version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{urllib.parse.quote(package)}/{urllib.parse.quote(version)}/json"
          exists = "false"
          try:
              urllib.request.urlopen(url, timeout=10)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              exists = "true"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"exists={exists}", file=output)
          PY
      - name: Stop when version is already on PyPI
        if: steps.pypi.outputs.exists == 'true'
        run: echo "Chatqiniu ${{ steps.meta.outputs.version }} is already on PyPI; skipping publish."
      - name: Build distribution
        if: steps.pypi.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI
        if: steps.pypi.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
